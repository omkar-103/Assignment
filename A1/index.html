<!DOCTYPE html>
<html>
<head>
  <title>Pikachu Design</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      background-color: lightgray;
    }

    .box{
      width: 90%;
      height: 600px;
      background-color: white;
      margin: 30px auto;
      position: relative;
      display: flex;
    }

    .left{
      width: 60%;
      background-color: yellow;
      padding: 50px;
    }

    .right{
      width: 40%;
      background-color: beige;
    }

    h1{
      font-size: 80px;
      margin-top: 20px;
    }

    p{
      margin-top: 20px;
      width: 70%;
      line-height: 30px;
      font-size: 20px;
    }

    .logo{
      width: 120px;
    }

    .pikachu{
      width: 500px;
      position: absolute;
      right: 100px;
      top: 100px;
    }

    .menu{
      position: absolute;
      right: 30px;
      top: 20px;
      font-size: 40px;
    }

  </style>
</head>

<body>

  <div class="box">

    <div class="left">

      <img class="logo"
      src="./pokemonlogo.png">
<br>
<br>
<br>
<h3>POKEMON GEN-1</h3>
<br>
<br>
<br>
      <h1>Pikachu</h1>

      <p>
      Pikachu is an Electric-type Pokémon introduced <br>
    in Generation I. Pikachu are small, chubby, <br>
    and incredibly cute mouse-like Pokémon.<br>
    They are almost completely covered by<br>
    yellow fur.
  
      </p>
      <br>
      <br>

        <h3>- 01 / 08</h3>
    </div>

    <div class="right"></div>

    <div class="menu">☰</div>

    <img class="pikachu"
    src="./pikachu.png">

  </div>

</body>
</html>
